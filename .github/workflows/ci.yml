name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint pipeline (tsc strict)
        run: npx tsc --noEmit --strict pipeline/lib/schema.ts pipeline/render.ts pipeline/tts.ts || true

  render-sample:
    name: Render sample video
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            chromium-browser \
            libx11-xcb1 \
            libxcomposite1 \
            libxcursor1 \
            libxdamage1 \
            libxi6 \
            libxtst6 \
            libnss3 \
            libcups2 \
            libxss1 \
            libxrandr2 \
            libasound2 \
            libatk1.0-0 \
            libpangocairo-1.0-0 \
            libgtk-3-0

      - name: Install dependencies
        run: npm ci

      - name: Create sample episode DB
        run: |
          mkdir -p data output
          node -e "
          import('./pipeline/lib/db.js').then(({ db }) => {
            const ep = db.episodes.create({
              title: 'CI Sample Episode',
              template: 'karpathy',
            });
            const props = {
              title: 'CI Sample Episode',
              scenes: [
                { type: 'title', data: { title: 'CI Sample', subtitle: 'Automated test render' }, durationInFrames: 60 },
                { type: 'transition', data: { text: 'Pipeline verified.' }, durationInFrames: 45 }
              ]
            };
            db.episodes.update(ep.id, { props_json: JSON.stringify(props), status: 'scripted' });
            console.log(ep.id);
          });
          " > /tmp/episode-id.txt
          EPISODE_ID=$(cat /tmp/episode-id.txt | tail -1)
          echo "EPISODE_ID=$EPISODE_ID" >> $GITHUB_ENV

      - name: Render sample (preview quality)
        run: |
          npx tsx pipeline/render.ts --episode-id "$EPISODE_ID" --quality preview
        env:
          REMOTION_CHROME_EXECUTABLE: /usr/bin/chromium-browser

      - name: Verify output exists
        run: |
          ls -lh output/*.mp4
          test -f "output/${EPISODE_ID}.mp4"

      - name: Upload rendered artifact
        uses: actions/upload-artifact@v4
        with:
          name: sample-video-${{ github.sha }}
          path: output/*.mp4
          retention-days: 7
