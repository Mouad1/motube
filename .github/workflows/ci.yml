name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint pipeline (tsc strict)
        run: npx tsc --noEmit --strict pipeline/lib/schema.ts pipeline/render.ts pipeline/tts.ts || true

  render-sample:
    name: Render sample video
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # Ubuntu 24.04 (noble) renamed several libs to *-t64 (time_t 64-bit ABI).
          # chromium-browser is no longer in apt on noble (snap-only) — Remotion
          # downloads its own Chrome Headless Shell via `npx remotion browser ensure`.
          sudo apt-get install -y \
            ffmpeg \
            libx11-xcb1 \
            libxcomposite1 \
            libxcursor1 \
            libxdamage1 \
            libxi6 \
            libxtst6 \
            libnss3 \
            libcups2t64 \
            libxss1 \
            libxrandr2 \
            libasound2t64 \
            libatk1.0-0t64 \
            libpangocairo-1.0-0 \
            libgtk-3-0t64

      - name: Install dependencies
        run: npm ci

      - name: Ensure Remotion browser
        run: npx remotion browser ensure

      - name: Create sample episode DB
        run: |
          mkdir -p data output
          EPISODE_ID=$(npx tsx pipeline/scripts/ci-sample-episode.ts | tail -1)
          echo "EPISODE_ID=$EPISODE_ID" >> $GITHUB_ENV

      - name: Render sample (preview quality)
        run: |
          npx tsx pipeline/render.ts --episode-id "$EPISODE_ID" --quality preview

      - name: Verify output exists
        run: |
          ls -lh output/*.mp4
          test -f "output/${EPISODE_ID}.mp4"

      - name: Upload rendered artifact
        uses: actions/upload-artifact@v4
        with:
          name: sample-video-${{ github.sha }}
          path: output/*.mp4
          retention-days: 7
